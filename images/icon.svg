<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="box" x1="60" y1="80" x2="196" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="lid" x1="60" y1="60" x2="196" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shield" x1="100" y1="110" x2="156" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.05">
    <circle cx="40" cy="40" r="1.5" fill="#60a5fa"/>
    <circle cx="80" cy="40" r="1.5" fill="#60a5fa"/>
    <circle cx="120" cy="40" r="1.5" fill="#60a5fa"/>
    <circle cx="160" cy="40" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="40" r="1.5" fill="#60a5fa"/>
    <circle cx="40" cy="80" r="1.5" fill="#60a5fa"/>
    <circle cx="80" cy="80" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="80" r="1.5" fill="#60a5fa"/>
    <circle cx="40" cy="216" r="1.5" fill="#60a5fa"/>
    <circle cx="80" cy="216" r="1.5" fill="#60a5fa"/>
    <circle cx="160" cy="216" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="216" r="1.5" fill="#60a5fa"/>
  </g>

  <!-- Container box — bottom -->
  <path d="M52 105 L128 70 L204 105 L204 185 L128 220 L52 185 Z" fill="url(#box)" opacity="0.85"/>
  <!-- Box left face -->
  <path d="M52 105 L128 140 L128 220 L52 185 Z" fill="#2563eb" opacity="0.7"/>
  <!-- Box right face -->
  <path d="M204 105 L128 140 L128 220 L204 185 Z" fill="#1d4ed8" opacity="0.8"/>
  <!-- Box top face -->
  <path d="M52 105 L128 70 L204 105 L128 140 Z" fill="url(#lid)" opacity="0.9"/>

  <!-- Container edge highlights -->
  <path d="M52 105 L128 140 L204 105" stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.4"/>
  <line x1="128" y1="140" x2="128" y2="220" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>

  <!-- Shield on front face -->
  <g filter="url(#glow)">
    <path d="M128 125 L148 135 L148 158 C148 170 128 180 128 180 C128 180 108 170 108 158 L108 135 Z"
      fill="url(#shield)" opacity="0.9"/>
  </g>
  <!-- Checkmark on shield -->
  <polyline points="118,152 126,160 140,144" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Docker whale hint — tiny dots above box -->
  <g opacity="0.4">
    <rect x="112" y="54" width="8" height="6" rx="1" fill="#60a5fa"/>
    <rect x="122" y="54" width="8" height="6" rx="1" fill="#60a5fa"/>
    <rect x="132" y="54" width="8" height="6" rx="1" fill="#60a5fa"/>
    <rect x="117" y="46" width="8" height="6" rx="1" fill="#60a5fa"/>
    <rect x="127" y="46" width="8" height="6" rx="1" fill="#60a5fa"/>
  </g>

  <!-- Sparkles -->
  <circle cx="72" cy="88" r="2" fill="#34d399" opacity="0.6"/>
  <circle cx="184" cy="88" r="1.5" fill="#60a5fa" opacity="0.5"/>
</svg>
